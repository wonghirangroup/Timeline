services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: timeline
      MYSQL_USER: timeline_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_dev_data:/var/lib/mysql

  server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
    ports:
      - "3000:3000"
    command: sh -c "npm install --silent && npm run dev"
    depends_on:
      - db

  admin:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"

  superadmin:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./superadmin:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"

  employee:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./employee:/app
      - /app/node_modules
    ports:
      - "5175:5175"
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"

volumes:
  db_dev_data:
